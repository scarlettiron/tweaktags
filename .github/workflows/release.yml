name: Release

# On every push to main this either opens a "Version Packages" pull request that
# collects the pending changesets, or, once that pull request is merged, publishes
# the newly versioned packages to npm and creates GitHub releases.
on:
  push:
    branches: [main]

# Never run two releases at once.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # to push the version pull request and create releases
  pull-requests: write # to open the version pull request
  id-token: write # to attach npm provenance to the published packages

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Create release pull request or publish
        uses: changesets/action@v1
        with:
          # Consumes the changesets and bumps versions for the pull request.
          version: pnpm changeset version
          # Publishes the already built packages when the version pull request merges.
          publish: pnpm changeset publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # changesets/action looks for NPM_TOKEN specifically. Without it, it
          # falls back to OIDC trusted publishing, which is not set up for these
          # packages, so authenticate with the token instead.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
