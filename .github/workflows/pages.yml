name: Deploy docs to GitHub Pages

# Publishes the static site in docs/ whenever it changes on the default branch.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# The permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deployments at once, and let an in progress one finish.
# Two overlapping deployments are a common cause of "Deployment failed".
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload the docs folder as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
